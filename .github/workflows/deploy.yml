name: Step 26 - Secret Usage

on: push

jobs:
  secret-job:
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - Start
        run: echo "Starting pipeline"

      - name: Step 2 - Validate Secret
        env:
          DEMO_SECRET: ${{ secrets.DEMO_SECRET }}
        run: |
          if [ -z "$DEMO_SECRET" ]; then
            echo "Secret missing"
            exit 1
          else
            echo "Secret exists"
          fi

      - name: Step 3 - Simulate Login
        env:
          DEMO_SECRET: ${{ secrets.DEMO_SECRET }}
        run: |
          echo "Logging in with secret..."
          echo "Login successful"

      - name: Step 4 - End
        run: echo "Pipeline finished"