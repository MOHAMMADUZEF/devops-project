name: Step 25 - Secrets

on: push

jobs:
  secret-test:
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - Start
        run: echo "Pipeline started"

      - name: Step 2 - Use Secret
        env:
          DEMO_SECRET: ${{ secrets.DEMO_SECRET }}
        run: |
          echo "Secret is being used"
          echo "Length check only"
          echo ${#DEMO_SECRET}

      - name: Step 3 - End
        run: echo "Pipeline finished"